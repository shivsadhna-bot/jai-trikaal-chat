<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jai Trikaal AI Chat</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; }
        .agent-container { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .agent-circle { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 2px solid #D4AF37; overflow: hidden; cursor: pointer;
        }
        .chat-box { 
            width: 90%; max-width: 500px; height: 400px; 
            border: 1px solid #D4AF37; margin: 20px auto; overflow-y: auto; padding: 10px;
            background: #111; border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>जय त्रिकाल AI परामर्श</h1>
    <div class="agent-container" id="agentList">
        <div class="agent-circle"><img src="https://via.placeholder.com/80" alt="Agent"></div>
    </div>
    <div class="chat-box" id="chatBox">
        <p>एजेंट चुनें और बात शुरू करें...</p>
    </div>
    <input type="text" id="userInput" placeholder="अपनी समस्या लिखें..." style="width: 70%; padding: 10px;">
    <button onclick="sendMessage()" style="padding: 10px; background: #D4AF37; border: none; cursor: pointer;">पूछें</button>

    <script>
        // यहाँ हम आगे AI का लॉजिक जोड़ेंगे
    </script>
</body>
</html>
