<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Trikaal AI</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { font-size: 24px; text-shadow: 2px 2px 4px #000; }
        .agent-container { display: flex; justify-content: center; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .agent-card { cursor: pointer; transition: 0.3s; }
        .agent-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #D4AF37; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; margin: 0 auto; }
        .agent-card:hover .agent-circle { box-shadow: 0 0 15px #D4AF37; }
        .chat-box { width: 100%; max-width: 500px; height: 400px; border: 1px solid #333; margin: 20px auto; overflow-y: auto; padding: 15px; background: #0a0a0a; border-radius: 12px; display: flex; flex-direction: column; text-align: left; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .user-msg { background: #D4AF37; color: #000; align-self: flex-end; }
        .ai-msg { background: #222; color: #fff; align-self: flex-start; border: 1px solid #333; }
        .input-area { display: flex; max-width: 500px; margin: 0 auto; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #D4AF37; background: #111; color: #fff; }
        button { padding: 10px 20px; border-radius: 25px; border: none; background: #D4AF37; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>✨ जय त्रिकाल AI ✨</h1>
    
    <div class="agent-container" id="agentList">
        <div class="agent-card" onclick="setAgent('Expert')"><div class="agent-circle">Expert</div><span>Guru Ji</span></div>
        <div class="agent-card" onclick="setAgent('Love')"><div class="agent-circle">Love</div><span>Priya</span></div>
        <div class="agent-card" onclick="setAgent('Career')"><div class="agent-circle">Career</div><span>Aman</span></div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="अपनी समस्या पूछें...">
        <button onclick="sendMessage()">पूछें</button>
    </div>

    <script>
        const API_KEY = ""; // <--- यहाँ अपनी Gemini API Key पेस्ट करें
        let currentAgentPrompt = "तुम एक विशेषज्ञ ज्योतिषी हो।";

        function setAgent(type) {
            if(type === 'Love') currentAgentPrompt = "तुम प्रेम संबंधों के विशेषज्ञ ज्योतिषी हो।";
            if(type === 'Career') currentAgentPrompt = "तुम करियर और धन के विशेषज्ञ ज्योतिषी हो।";
            alert(type + " एजेंट सक्रिय है।");
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if(!input.value) return;

            // User Message
            chatBox.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
            const userText = input.value;
            input.value = "";

            // Gemini AI Call
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: currentAgentPrompt + " यूजर का सवाल: " + userText }] }]
                    })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="msg ai-msg">${aiText}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg ai-msg">Error: API Key चेक करें या बाद में प्रयास करें।</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
